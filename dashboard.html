<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Skill Bridge</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Skill Bridge</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="#" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2 id="welcomeText">SkillBridge AI </h2>
    <p id="roleText">Your AI-powered career companion for skill gap analysis resume insight and professional growth</p>
  </section>

  <!-- DASHBOARD GRID -->
  <div class="grid">

    <!-- SKILL ANALYSIS -->
    <div class="card">
      <h3>🎯 Skill Analysis</h3>
      <input type="text" id="skillsInput" placeholder="HTML, CSS, JS">
      <button id="analyzeBtn">Analyze</button>
      <div id="resultSection"></div>
    </div>

    <!-- RESUME -->
    <div class="card">
      <h3>📄 Resume Upload</h3>
      <input type="file" id="resumeInput">
      <button onclick="uploadResume()">Upload</button>
    </div>

    <!-- SCORE -->
    <div class="card">
      <h3>📊 Skill Match Score</h3>
      <h2 id="score">0%</h2>
    </div>

    <!-- CHAT -->
    <div class="card">
      <h3>🤖 AI Chat</h3>
      <input type="text" id="chatInput" placeholder="Ask career question">
      <button onclick="chat()">Send</button>
      <div id="chatOutput"></div>
    </div>

  </div>

  <!-- ROLE BASED FEATURES -->
  <section class="features" id="featuresSection"></section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Skill Bridge | Built by Vibha</p>
  </footer>

</body>
</html>
