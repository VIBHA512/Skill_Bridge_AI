<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Skill Bridge</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <section class="hero">
    <h2 id="welcomeText">SkillBridge AI</h2>
    <p id="roleText">Your AI-powered career companion for skill gap analysis, redume insights and professional growth</p>
  </section>
  <div class="container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

      <h2>Enter Your Skills</h2>
      <input type="text" id="skillsInput" placeholder="Python, SQL, ML">

      <h2>Select Target Career</h2>
      <select id="career">
        <option>Data Scientist</option>
      <option>Web Developer</option>
      <option>AI Engineer</option>
      <option>Cybersecurity Analyst</option>
      <option>Data Analyst</option>
      <option>Frontend Developer</option>
      <option>Backend Developer</option>
      <option>Cloud Engineer</option>
      </select>

      <h2>Upload Resume</h2>
      <input type="file" id="resumeInput">
      <button id="uploadBtn">Extract Skills</button>

      <h2>Enter Soft Skills</h2>
      <input type="text" id="softSkills" placeholder="Communication, Leadership">

      <button id="analyzeBtn">Analyze Skill Gap</button>
      <button id="recommendBtn">Recommend Career</button>
      <button id="progressBtn">Progress Dashboard</button>
      <button id="suggestBtn">Suggest Careers</button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <div class="output-box" id="outputBox">
        <!-- Results will come here -->
      </div>

      <div class="chat-box">
        <input type="text" id="chatInput" placeholder="Ask about skills, careers...">
        <button id="chatBtn">Send</button>
      </div>

      <div id="chatOutput"></div>

    </div>

  </div>

  <!-- SCRIPT -->
  <script type="module">

    // 🎯 ANALYZE
    document.getElementById("analyzeBtn").addEventListener("click", () => {
      const skills = document.getElementById("skillsInput").value;

      document.getElementById("outputBox").innerHTML =
        `<h3>Skill Gap Analysis</h3><p>Improve ${skills} with advanced topics 🚀</p>`;
    });

    // 📄 RESUME
    document.getElementById("uploadBtn").addEventListener("click", () => {
      const file = document.getElementById("resumeInput").files[0];

      if (!file) {
        alert("Upload resume first");
        return;
      }

      document.getElementById("outputBox").innerHTML =
        `<h3>Resume Analysis</h3><p>Skills extracted successfully ✅</p>`;
    });

    // 🤖 CHAT
    document.getElementById("chatBtn").addEventListener("click", () => {
      const input = document.getElementById("chatInput").value;

      let reply = "Focus on improving your skills.";

      if (input.toLowerCase().includes("career")) {
        reply = "Try Data Science or Web Dev 🚀";
      }

      document.getElementById("chatOutput").innerHTML += `
        <p><b>You:</b> ${input}</p>
        <p><b>AI:</b> ${reply}</p>
      `;
    });

    // 💡 RECOMMEND
    document.getElementById("recommendBtn").addEventListener("click", () => {
      document.getElementById("outputBox").innerHTML =
        `<h3>Recommended Career</h3><p>Data Scientist 📊</p>`;
    });

    document.getElementById("progressBtn").addEventListener("click", () => {
      document.getElementById("outputBox").innerHTML =
        `<h3>Progress</h3><p>You are 65% ready 🚀</p>`;
    });

    document.getElementById("suggestBtn").addEventListener("click", () => {
      document.getElementById("outputBox").innerHTML =
        `<h3>Suggestions</h3><p>AI Engineer, Backend Dev</p>`;
    });

  </script>

</body>
</html>
