<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Skill Bridge</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>

<section class="hero">
  <h2>SkillBridge AI 🚀</h2>
  <p>Your AI-powered career companion</p>
</section>

<div class="container">

  <!-- LEFT -->
  <div class="left-panel">
    <h3>Enter Skills</h3>
    <input type="text" id="skillsInput" placeholder="Python, HTML, ML">

    <h3>Select Career</h3>
    <select id="career">
      <option>AI Engineer</option>
      <option>Web Developer</option>
      <option>Data Scientist</option>
      <option>Cybersecurity Analyst</option>
    </select>

    <h3>Upload Resume</h3>
    <input type="file" id="resumeInput">
    <button id="uploadBtn">Extract Skills</button>

    <button id="analyzeBtn">Analyze Skill Gap</button>
    <button id="recommendBtn">Recommend Career</button>
  </div>

  <!-- MIDDLE -->
  <div class="middle-panel">

    <div class="result-card">
      <h3>📊 Scores</h3>
      <p>Technical: <span id="techScore">0%</span></p>
      <p>Overall: <span id="overallScore">0%</span></p>
      <canvas id="skillChart"></canvas>
    </div>

    <div class="result-card">
      <h3>🎯 AI Career Suggestion</h3>
      <p id="careerResult">--</p>
    </div>

    <div class="result-card">
      <h3>✅ Your Skills</h3>
      <p id="yourSkills"></p>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <h3>🤖 AI Chatbot</h3>
    <div id="chatOutput"></div>

    <input type="text" id="chatInput" placeholder="Ask anything...">
    <button id="chatBtn">Send</button>
  </div>

</div>

<script type="module">

// 🔑 ADD YOUR API KEY
const API_KEY = "AIzaSyDaOEoGpS9wlP9SDfpd4D8Vhe2OsHEfor4";

// 🤖 AI FUNCTION
async function getAIResponse(prompt) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
    {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        contents: [{ role: "user", parts: [{ text: prompt }] }]
      })
    }
  );

  const data = await res.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
}

// 📊 CHART
let chart;
function updateChart(score) {
  const ctx = document.getElementById("skillChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Score"],
      datasets: [{
        label: "%",
        data: [score]
      }]
    }
  });
}

// 📄 RESUME ANALYSIS
document.getElementById("uploadBtn").addEventListener("click", async () => {

  const file = document.getElementById("resumeInput").files[0];
  if (!file) return alert("Upload resume first");

  document.getElementById("yourSkills").innerText = "Reading resume...";

  const reader = new FileReader();

  reader.onload = async function () {

    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

    let fullText = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      fullText += content.items.map(i => i.str).join(" ") + " ";
    }

    // 🤖 AI ANALYSIS
    const result = await getAIResponse(`
Analyze this resume:
${fullText}

Give:
1. Best career
2. Skills
3. Improvements
`);

    document.getElementById("careerResult").innerHTML =
      result.replace(/\n/g, "<br>");
  };

  reader.readAsArrayBuffer(file);
});

// 🤖 CHATBOT
document.getElementById("chatBtn").addEventListener("click", async () => {

  const input = document.getElementById("chatInput").value.trim();
  if (!input) return;

  const chat = document.getElementById("chatOutput");

  chat.innerHTML += `<p><b>You:</b> ${input}</p>`;

  const thinking = document.createElement("p");
  thinking.innerHTML = "<b>AI:</b> Thinking...";
  chat.appendChild(thinking);

  const reply = await getAIResponse(input);

  thinking.innerHTML = "<b>AI:</b> " + reply.replace(/\n/g, "<br>");
});

// 🎯 BASIC ANALYZE
document.getElementById("analyzeBtn").addEventListener("click", () => {

  const skills = document.getElementById("skillsInput").value.split(",");
  const score = Math.min(100, skills.length * 15);

  document.getElementById("techScore").innerText = score + "%";
  document.getElementById("overallScore").innerText = score + "%";

  updateChart(score);
});

</script>

</body>
</html>
